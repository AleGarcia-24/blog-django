{% extends 'blog/base.html' %}

{% block content %}
    <h1>Posts del Blog</h1>
    {% for post in posts %}
        <div class="post">
            <h2><a href="{% url 'detalle_post' post.pk %}">{{ post.titulo }}</a></h2>
            <p>Por {{ post.autor }} | {{ post.fecha_creacion|date:"d/m/Y" }}</p>
            <p>{{ post.contenido|truncatewords:30 }}</p>
        </div>
    {% empty %}
        <p>No hay posts todavía.</p>
    {% endfor %}
{% endblock %}
