{% extends 'blog/base.html' %}

{% block content %}
    <div class="post">
        <h1>{{ post.titulo }}</h1>
        <p>Por {{ post.autor }} | {{ post.fecha_creacion|date:"d/m/Y" }}</p>
        <p>{{ post.contenido }}</p>
        <a href="{% url 'lista_posts' %}">← Volver</a>
    </div>
{% endblock %}
